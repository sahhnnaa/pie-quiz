<!doctype html>
<html>
    <head>
        <!-- website icon -->
        <link rel="icon" href="https://static.vecteezy.com/system/resources/previews/019/040/589/non_2x/an-8-bit-retro-styled-pixel-art-illustration-of-pumpkin-pie-free-png.png" type="image/x-icon">
        <title>what kind of pie are you?</title>
        <style>
            /* getting font */
            @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100..700&display=swap');

            body
            {
                font-family: "Josefin Sans", sans-serif;
                background: linear-gradient(180deg,#d9e2d2,#cad3c4);
                display:flex;
                justify-content:center;
                align-items:center;
                height:100vh;
                margin:0;
                color:#6f5a53;
            }

            .container
            {
                background:white;
                padding:38px;
                border-radius:26px;
                width:420px;
                text-align:center;
                box-shadow:0 20px 40px #6f5a53;
            }

            h1
            {
                font-weight:600;
                color:#b77c6b;
                margin-bottom:6px;
            }

            .subtitle
            {
                font-size:14px;
                color:#9e8075;
                margin-bottom:26px;
            }

            h3
            {
                font-weight:500;
                margin-bottom:16px;
            }

            button
            {   
                font-family: "Josefin Sans", sans-serif;
                display:flex;
                justify-content:space-between;
                align-items:center;
                width:100%;
                padding:14px 16px;
                margin:8px 0;
                border:none;
                border-radius:14px;
                background:#fff1ec;
                cursor:pointer;
                font-size:15px;
                transition:all .18s ease;
                color:#6f5a53
            }

            /* cursor on button */
            button:hover
            {
                background:#f5f4ab;
                transform:translateY(-1px);
            }

            .emoji
            {
                font-size:18px;
            }

            .result
            {
                font-size:22px;
                margin-top:14px;
                color:#6b4c3b;
            }

            .pie
            {
                font-size:64px;
                margin-bottom:8px;
            }

            canvas
            {
                position:fixed;
                top:0;
                left:0;
                pointer-events:none;
            }

        </style>
    </head>

    <body>
        <canvas id="confetti"></canvas>
        <div class="container">
            <h1>what kind of pie are you?</h1>
            <p class="subtitle">a cozy little bakery quiz</p>
            <div id="quiz"></div>
            <div id="result"></div>
        </div>

        <script>

            /* 5 cozy questions */
            const questions=
            [
                /* cozy activity */
                {
                q:"pick a cozy activity",
                options:[
                    ["cozy movie night","🍿","apple"],
                    ["fun game night","🎲","cherry"],
                    ["reading at a cafe","📚","pumpkin"],
                    ["going for a nature walk","🌱","blueberry"],
                    ["midnight snack run","🍭","chocolate"]
                ]
                },

                /* cozy drink */
                {
                q:"pick a cozy drink",
                options:[
                    ["iced/hot latte","☕","pumpkin"],
                    ["fruit juice","🧃","cherry"],
                    ["green tea","🍵","blueberry"],
                    ["milk","🥛","apple"],
                    ["hot chocolate","🍫","chocolate"]
                ]
                },

                /* cozy color */
                {
                q:"pick a cozy color",
                options:[
                    ["ruby red","❤️","cherry"],
                    ["burnt orange","🧡","pumpkin"],
                    ["sky blue","💙","blueberry"],
                    ["chocolate brown","🤎","chocolate"],
                    ["golden honey","💛","apple"]
                ]
                },

                /* cozy vibe */
                {
                q:"pick a cozy vibe",
                options:[
                    ["warm & comfy","🧣","pumpkin"],
                    ["homey & cozy","🏠","apple"],
                    ["sweet & rich","🍩","chocolate"],
                    ["happy & fun","🎮","cherry"],
                    ["calm & creative","🎨","blueberry"]
                ]
                },

                /* cozy dessert */
                {
                q:"pick a cozy dessert",
                options:[
                    ["vanilla ice cream","🍨","apple"],
                    ["snickerdoodle","🍪","pumpkin"],
                    ["fudge brownie","🍫","chocolate"],
                    ["blueberry muffin","🫐","blueberry"],
                    ["cherry tart","🍒","cherry"]
                ]
                }
            ]

            let current = 0

            /* quiz score for result */
            let scores = {
                apple: 0,
                cherry: 0,
                pumpkin: 0,
                blueberry: 0,
                chocolate: 0
            }

            const quiz = document.getElementById("quiz")

            /* question */
            function showQuestion()
            {
                let q = questions[current]
                let html = `<h3>${q.q}</h3>`
                q.options.forEach
                    (opt=> {
                        html+=`<button onclick = "choose('${opt[2]}')">
                        <span>${opt[0]}</span>
                        <span class = "emoji">${opt[1]}</span>
                        </button>`
                    })
                quiz.innerHTML = html
            }

            function choose(type)
            {
                scores[type]++
                current++
                if(current<questions.length) {
                    showQuestion()
                } 
                else {
                    showResult()
                }
            }

            function showResult()
            {
                quiz.style.display = "none"
                let top = Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b)
                
                /* end result */
                let results =
                    {
                        apple:["🍎","apple pie","you're the cozy classic. warm blankets, comfort movies, and the friend everyone loves having around."],
                        cherry:["🍒","cherry pie","you're sweet with a little bold energy. life feels more fun when you're there."],
                        pumpkin:["🥧","pumpkin pie","you're pure cozy energy. think autumn vibes, soft music, and warm drinks."],
                        blueberry:["🫐","you're calm, creative, and you appreciate the quiet little things in life."],
                        chocolate:["🍫","chocolate pie","you're sweet, a little indulgent, and firmly believe dessert is always a good idea."]
                    }

                let r = results[top]
                document.getElementById("result").innerHTML =
                    `<div class="pie">${r[0]}</div>
                    <div class="result">you are <b>${r[1]}</b>!</div>
                    <p>${r[2]}</p>
                    <button onclick="location.reload()">take the quiz again</button>`
            }

            showQuestion()

        </script>
    </body>
</html>
